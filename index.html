<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Temperature Converter</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family: Arial, sans-serif;
    }

    body{
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
        background:linear-gradient(135deg,#4facfe,#00f2fe);
    }

    .container{
        background:white;
        padding:30px;
        border-radius:15px;
        box-shadow:0 8px 20px rgba(0,0,0,0.2);
        width:350px;
        text-align:center;
    }

    h1{
        margin-bottom:20px;
        color:#333;
    }

    input, select{
        width:100%;
        padding:12px;
        margin:10px 0;
        border:1px solid #ccc;
        border-radius:8px;
        font-size:16px;
    }

    button{
        width:100%;
        padding:12px;
        border:none;
        background:#4facfe;
        color:white;
        font-size:18px;
        border-radius:8px;
        cursor:pointer;
        transition:0.3s;
    }

    button:hover{
        background:#007bff;
    }

    #result{
        margin-top:20px;
        font-size:20px;
        font-weight:bold;
        color:#222;
    }

    .error{
        color:red;
        margin-top:10px;
    }
</style>
</head>
<body>

<div class="container">
    <h1>🌡 Temperature Converter</h1>

    <input type="text" id="tempInput" placeholder="Enter Temperature">

    <select id="fromUnit">
        <option value="C">Celsius (°C)</option>
        <option value="F">Fahrenheit (°F)</option>
        <option value="K">Kelvin (K)</option>
    </select>

    <select id="toUnit">
        <option value="F">Fahrenheit (°F)</option>
        <option value="C">Celsius (°C)</option>
        <option value="K">Kelvin (K)</option>
    </select>

    <button onclick="convertTemperature()">Convert</button>

    <div id="result"></div>
    <div id="error" class="error"></div>
</div>

<script>
function convertTemperature() {
    let temp = document.getElementById("tempInput").value;
    let from = document.getElementById("fromUnit").value;
    let to = document.getElementById("toUnit").value;

    let result = document.getElementById("result");
    let error = document.getElementById("error");

    result.innerHTML = "";
    error.innerHTML = "";

    // Validation
    if (temp === "" || isNaN(temp)) {
        error.innerHTML = "Please enter a valid number!";
        return;
    }

    temp = parseFloat(temp);
    let converted;

    // Convert input to Celsius first
    let celsius;

    if (from === "C") {
        celsius = temp;
    } 
    else if (from === "F") {
        celsius = (temp - 32) * 5 / 9;
    } 
    else if (from === "K") {
        celsius = temp - 273.15;
    }

    // Convert Celsius to target unit
    if (to === "C") {
        converted = celsius;
        unit = "°C";
    } 
    else if (to === "F") {
        converted = (celsius * 9 / 5) + 32;
        unit = "°F";
    } 
    else if (to === "K") {
        converted = celsius + 273.15;
        unit = "K";
    }

    result.innerHTML =
        `${temp} ${from} = ${converted.toFixed(2)} ${unit}`;
}
</script>

</body>
</html>
